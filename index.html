<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本語単語検索</title>
    <style>
        body {
            font-family: "Hiragino Mincho ProN", "MS PMincho", serif; 
            margin: 20px;
            max-width: 900px;
            color: #333;
            background-color: #fdfdfd;
        }
        .dict-status {
            padding: 10px;
            background-color: #e8f4f8;
            border-left: 4px solid #3498db;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .keyboard-wrapper {
            overflow-x: auto;
            max-width: 100%;
            margin-bottom: 20px;
            padding-bottom: 10px;
        }
        .keyboard {
            display: grid;
            /* ここを「11列」に設定（ん〜あ行まで11列） */
            grid-template-columns: repeat(11, 50px);
            gap: 5px;
            width: max-content;
        }
        .key {
            width: 50px;
            height: 50px;
            border: 1px solid #ccc;
            background-color: #f9f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            cursor: pointer;
            font-size: 20px;
            user-select: none;
            border-radius: 5px;
            box-sizing: border-box;
        }
        .key:hover {
            background-color: #e9e9e9;
        }
        .key.empty {
            background-color: transparent;
            border: none;
            cursor: default;
        }
        .badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background-color: #e74c3c;
            color: white;
            font-size: 11px;
            padding: 2px 5px;
            border-radius: 10px;
            line-height: 1;
            white-space: nowrap;
            z-index: 2;
        }
        .controls {
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin-right: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #fff;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #f0f0f0;
        }
        .result-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        .result-item {
            padding: 6px 12px;
            background: #e0e0e0;
            border-radius: 5px;
            font-size: 15px;
            letter-spacing: 0.05em;
        }
        .input-sequence {
            margin-bottom: 10px;
            font-size: 18px;
            font-weight: bold;
        }
        .loading {
            color: #e67e22;
        }
    </style>
</head>
<body>
    <h2>日本語単語検索</h2>
    <div id="dict-status" class="dict-status loading">辞書を読み込んでいます...</div>
    
    <p>50音表のボタンを押して文字を入力し、「検索」を押してください。<br>
    ※n番目に押されたボタンの周囲（最大8方向）の文字からn文字目を選び、生成された組み合わせのうち、辞書に存在する単語のみを表示します。</p>
    
    <div class="input-sequence" id="input-sequence">入力: </div>
    
    <div class="keyboard-wrapper">
        <div class="keyboard" id="keyboard"></div>
    </div>
    
    <div class="controls">
        <button onclick="search()" style="background-color: #e8f4f8; border-color: #3498db;">検索</button>
        <button onclick="clearInput()">クリア</button>
    </div>
    
    <div id="results"></div>

    <script>
        // 辞書データの保持用
        let dictionary = new Set();

        // 辞書ファイルの読み込み
        async function loadDictionary() {
            const statusEl = document.getElementById('dict-status');
            try {
                // 同じリポジトリ内にある buta014.dic を読み込む
                const response = await fetch('buta014.dic');
                if (!response.ok) throw new Error('Network response was not ok');

                const buffer = await response.arrayBuffer();
                const decoder = new TextDecoder('shift_jis');
                const text = decoder.decode(buffer);
                
                // 改行で分割し、Setに格納（検索を高速化）
                const words = text.split(/\r?\n/).map(w => w.trim()).filter(w => w.length > 0);
                dictionary = new Set(words);
                
                statusEl.innerText = `辞書読み込み完了（収録語数: ${dictionary.size.toLocaleString()}語）`;
                statusEl.classList.remove('loading');
                statusEl.style.borderLeftColor = '#2ecc71';
            } catch (error) {
                statusEl.innerText = '⚠️ 辞書ファイルの読み込みに失敗しました。';
                statusEl.style.borderLeftColor = '#e74c3c';
                statusEl.style.backgroundColor = '#fdf2f0';
                console.error('Dictionary load error:', error);
            }
        }

        // 50音表の配列定義（11列 × 5行）
        // 右側から「あ行」「か行」… 一番左が「ん」
        const grid = [
            ['ん', 'わ', 'ら', 'や', 'ま', 'は', 'な', 'た', 'さ', 'か', 'あ'],
            [null, null, 'り', null, 'み', 'ひ', 'に', 'ち', 'し', 'き', 'い'],
            [null, null, 'る', 'ゆ', 'む', 'ふ', 'ぬ', 'つ', 'す', 'く', 'う'],
            [null, null, 'れ', null, 'め', 'へ', 'ね', 'て', 'せ', 'け', 'え'],
            [null, 'を', 'ろ', 'よ', 'も', 'ほ', 'の', 'と', 'そ', 'こ', 'お']
        ];

        let sequence = []; // 入力された文字と座標の履歴

        // キーボードの描画
        function renderKeyboard() {
            const container = document.getElementById('keyboard');
            container.innerHTML = '';
            
            // 行(r)は0〜4、列(c)は0〜10（11列）でループ
            for (let r = 0; r < 5; r++) {
                for (let c = 0; c < 11; c++) {
                    const char = grid[r][c];
                    const div = document.createElement('div');
                    
                    if (char) {
                        div.className = 'key';
                        div.innerText = char;
                        div.onclick = () => handleKeyClick(r, c);
                        
                        // 押された順番を特定してバッジを付与
                        const orders = [];
                        sequence.forEach((item, index) => {
                            if (item.r === r && item.c === c) {
                                orders.push(index + 1);
                            }
                        });
                        
                        if (orders.length > 0) {
                            const badge = document.createElement('div');
                            badge.className = 'badge';
                            badge.innerText = orders.join(',');
                            div.appendChild(badge);
                        }
                    } else {
                        // 空白マス
                        div.className = 'key empty';
                    }
                    container.appendChild(div);
                }
            }
            
            // 入力履歴のテキスト更新
            document.getElementById('input-sequence').innerText = 
                '入力: ' + sequence.map(s => s.char).join('');
        }

        // キーがクリックされたときの処理
        function handleKeyClick(r, c) {
            const char = grid[r][c];
            if (!char) return;
            sequence.push({char, r, c});
            renderKeyboard();
        }

        // 入力のクリア
        function clearInput() {
            sequence = [];
            document.getElementById('results').innerHTML = '';
            renderKeyboard();
        }

        // 周囲（最大8方向）の文字を取得する関数
        function getNeighbors(r, c) {
            const neighbors = [];
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    if (dr === 0 && dc === 0) continue; // 自分自身は除外
                    
                    const nr = r + dr;
                    const nc = c + dc;
                    
                    // 盤面の範囲内かチェック (5行 × 11列)
                    if (nr >= 0 && nr < 5 && nc >= 0 && nc < 11) {
                        const char = grid[nr][nc];
                        if (char) { // 空白マスでなければ追加
                            neighbors.push(char);
                        }
                    }
                }
            }
            return neighbors;
        }

        // 全ての組み合わせ（直積）を生成する再帰関数
        function getCombinations(arrays) {
            if (arrays.length === 0) return [];
            if (arrays.length === 1) return arrays[0];
            
            const result = [];
            const rest = getCombinations(arrays.slice(1));
            
            for (const c of arrays[0]) {
                for (const r of rest) {
                    result.push(c + r);
                }
            }
            return result;
        }

        // 検索実行
        function search() {
            if (sequence.length === 0) {
                alert('文字を入力してください。');
                return;
            }
            if (dictionary.size === 0) {
                alert('辞書データが読み込まれていません。');
                return;
            }
            
            // 1. 各入力文字に対して周囲の文字リストを取得
            const candidatesList = [];
            let isValid = true;

            sequence.forEach(item => {
                const neighbors = getNeighbors(item.r, item.c);
                if (neighbors.length === 0) {
                    isValid = false; // 周囲に文字が1つもないボタンが押された場合
                }
                candidatesList.push(neighbors);
            });

            const resultDiv = document.getElementById('results');
            
            if (!isValid) {
                resultDiv.innerHTML = `<p style="color:red;">周囲に文字が存在しないボタンが含まれているため、単語を作成できません。</p>`;
                return;
            }
            
            // 2. 全ての組み合わせを生成
            const allCombinations = getCombinations(candidatesList);
            
            // 3. 辞書に含まれる文字のみを抽出
            const validResults = allCombinations.filter(word => dictionary.has(word));
            
            // 結果を画面に出力
            resultDiv.innerHTML = `<h3>検索結果: ${validResults.length}件 <span style="font-size:14px; font-weight:normal; color:#666;">(生成された全組み合わせ: ${allCombinations.length}通り)</span></h3>`;
            
            if (validResults.length > 0) {
                // 重複排除のためにSetを噛ませて表示
                const uniqueResults = [...new Set(validResults)];
                const resultHTML = uniqueResults.map(res => `<span class="result-item">${res}</span>`).join('');
                resultDiv.innerHTML += `<div class="result-container">${resultHTML}</div>`;
            } else {
                resultDiv.innerHTML += `<p>辞書に一致する単語は見つかりませんでした。</p>`;
            }
        }

        // 起動時の初期化
        window.onload = () => {
            loadDictionary();
            renderKeyboard();
        };
    </script>
</body>
</html>
